name: Bay Ave Barnacle Forecast

# Runs hourly (HANDOFF 9b.1 — sub-daily dynamic updates). Most hourly
# runs write HTML + JSON + append to data/predictions_log.csv, no email
# and no map regen. The 09:00 UTC run is the "full daily" run: email
# send + map regen + archive snapshot. 09:00 UTC = 5 AM EDT (summer) /
# 4 AM EST (winter). GitHub Actions cron does not adjust for DST.
#
# Also runnable manually from the Actions tab via workflow_dispatch —
# manual runs are treated as full-daily runs so testing exercises the
# email path.
on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour, UTC
  workflow_dispatch:

# One run at a time (2026-07-20): the 02:00 UTC slot double-fired,
# the two runs rebased into each other inside the commit step, and
# conflict markers shipped to the live site. Queued, never parallel.
concurrency:
  group: barnacle-forecast
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit docs/ + data/ updates

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install chart dependency
        run: pip install --quiet matplotlib

      - name: Self-heal inherited corruption (markers in data/docs)
        run: python forecast/heal_tree.py

      - name: Determine run type (daily vs hourly)
        id: when
        run: |
          today=$(date -u +%Y-%m-%d)
          hour=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$hour" = "09" ]; then
            is_daily="true"
          else
            is_daily="false"
          fi
          echo "today=$today"     >> "$GITHUB_OUTPUT"
          echo "hour=$hour"       >> "$GITHUB_OUTPUT"
          echo "is_daily=$is_daily" >> "$GITHUB_OUTPUT"
          echo "Run type: is_daily=$is_daily (hour=$hour UTC, event=${{ github.event_name }})"

      # EVENT-DRIVEN ALERTING (2026-07-17, user): no more daily-morning
      # email. Every hourly run evaluates the alert state; email + SMS
      # go out only when flood risk APPEARS or ESCALATES (tide regime
      # ≥ street in 72h, or pluvial risk). Manual dispatch forces a
      # send (test path). The 09:00 "daily" run still does map regen +
      # archive snapshot below — it just no longer implies email.
      - name: Run forecast (email/SMS only on alert-state escalation)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO:   ${{ secrets.SMTP_TO }}
          ALERT_SMS_TO: ${{ secrets.ALERT_SMS_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        working-directory: forecast
        run: |
          extra=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            extra="--force-email"
          fi
          python3 flood_forecast_daily.py \
            --write-html ../docs/index.html \
            --write-json ../docs/forecast.json $extra

      - name: Archive today's forecast snapshot (daily only)
        if: steps.when.outputs.is_daily == 'true'
        run: |
          mkdir -p docs/archive
          cp docs/index.html  "docs/archive/${{ steps.when.outputs.today }}.html"
          cp docs/forecast.json "docs/archive/${{ steps.when.outputs.today }}.json"
          # No heat-map PNG to archive — map renders client-side (9b.10).

      - name: Regenerate archive index (daily only)
        if: steps.when.outputs.is_daily == 'true'
        run: |
          cd docs/archive
          {
            cat <<'HEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Bay Ave Barnacle — Forecast Archive</title>
          <link rel="stylesheet" href="../style.css">
          </head>
          <body>
          <main>
            <header>
              <h1>Bay Ave Barnacle — Forecast Archive</h1>
              <p class="subtitle"><a href="../">&larr; Back to today's forecast</a></p>
            </header>
            <section>
              <h2>Past forecasts</h2>
              <ul class="archive-list">
          HEAD
            for f in $(ls -r 20*.html 2>/dev/null); do
              date_str="${f%.html}"
              echo "      <li><a href=\"$f\">$date_str</a></li>"
            done
            cat <<'TAIL'
              </ul>
            </section>
            <footer>
              <p><a href="https://github.com/JohnUrban/barnacle">Source code &amp; model</a></p>
            </footer>
          </main>
          </body>
          </html>
          TAIL
          } > index.html

      - name: Publish gate (no markers, strict JSON)
        run: python forecast/check_artifacts.py

      - name: Commit and push docs/ + data/ updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit FIRST (clean generated state), then rebase our commit
          # onto whatever landed meanwhile, re-run the publish gate, and
          # only then push. A failed rebase ABORTS the publish (next run
          # regenerates everything) instead of shipping merge artifacts
          # — the 02:00 twin-run race put conflict markers on the live
          # site through the old swallow-errors pull.
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "No updates to commit"
            exit 0
          fi
          if [ "${{ steps.when.outputs.is_daily }}" = "true" ]; then
            msg="daily forecast ${{ steps.when.outputs.today }}"
          else
            msg="hourly update ${{ steps.when.outputs.today }} ${{ steps.when.outputs.hour }}:00 UTC"
          fi
          git commit -m "$msg"
          for attempt in 1 2 3; do
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            if ! git pull --rebase; then
              echo "REBASE CONFLICT — aborting publish (no corruption shipped)"
              git rebase --abort || true
              exit 1
            fi
            if ! python forecast/check_artifacts.py; then
              echo "PUBLISH GATE FAIL after rebase — aborting publish"
              exit 1
            fi
          done
          echo "push failed after 3 attempts"
          exit 1
