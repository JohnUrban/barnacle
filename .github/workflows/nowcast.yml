name: Barnacle Nowcast

# LIVE radar nowcast (2026-07-17, HANDOFF designated session).
# Requests a run every 10 minutes: a stdlib-only trigger check (~15 s, no heavy
# deps) decides whether radar is worth paying for — active NWS flood
# alert or near-term convective wording. When triggered: install
# xarray/cfgrib (cached), pull the last hour of MRMS PrecipRate over
# the hillside catchment, run the v0.10.1 tank, and commit
# docs/nowcast.json ONLY (tiny file, no conflict surface with the
# hourly forecast workflow). GitHub schedules are best-effort; the site
# and widget enforce a strict safety rule and never render >20-min-old
# radar output as live.
on:
  schedule:
    # Offset from round minutes to reduce GitHub schedule congestion.
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: barnacle-nowcast
  # A full radar pass can outlive the 10-minute schedule interval.
  # Cancelling in-progress runs starved publication: completed commits
  # had a 31.6-minute median interval (60-minute p90) on 2026-07-18–21.
  # Keep the active run; GitHub may coalesce queued runs naturally.
  cancel-in-progress: false

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # cache:pip REQUIRES a requirements file to hash — without
          # one, setup-python FAILS the whole job (found 2026-07-18
          # after a night of 10-minute failure-notification emails).
          cache: 'pip'
          cache-dependency-path: forecast/nowcast-requirements.txt

      - name: Trigger check (stdlib, cheap)
        id: gate
        run: |
          set +e
          python forecast/nowcast.py --check
          code=$?
          set -e
          if [ "$code" = "0" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "3" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            exit $code
          fi

      - name: Install radar deps
        if: steps.gate.outputs.go == 'true'
        run: pip install --quiet -r forecast/nowcast-requirements.txt

      - name: Run nowcast
        if: steps.gate.outputs.go == 'true'
        run: python forecast/nowcast.py

      - name: Publish gate (no markers, strict JSON)
        if: steps.gate.outputs.go == 'true'
        run: python forecast/check_artifacts.py

      - name: Commit nowcast.json
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "barnacle-nowcast"
          git config user.email "actions@users.noreply.github.com"
          git add docs/nowcast.json
          if git diff --cached --quiet; then
            echo "no change"; exit 0
          fi
          git commit -m "nowcast $(date -u +'%Y-%m-%d %H:%M') UTC"
          for i in 1 2 3; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase conflict - abort publish"; exit 1; }
            python forecast/check_artifacts.py
            sleep 2
          done
          exit 1
